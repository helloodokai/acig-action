name: 'ACIG Review'
description: 'Agentic CI Gateway — tiered code review via cheap critics + frontier adjudication'
branding:
  icon: shield
  color: green
inputs:
  github-token:
    description: 'GitHub token for posting reviews (use app token for ACIG branding, or GITHUB_TOKEN for default)'
    required: true
  profile:
    description: 'Model profile: cloud or local'
    required: false
    default: 'cloud'
  version:
    description: 'acig version to install'
    required: false
    default: '1.5.2'
  format:
    description: 'Output format: json, md, or both'
    required: false
    default: 'both'
  budget:
    description: 'Per-run budget in USD'
    required: false
    default: ''
  blocking:
    description: 'Fail the build on warn/block verdicts (true/false)'
    required: false
    default: 'true'
  ollama-api-key:
    description: 'Ollama Cloud API key'
    required: false
    default: ''
  openai-api-key:
    description: 'OpenAI API key'
    required: false
    default: ''
  anthropic-api-key:
    description: 'Anthropic API key'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Install acig
      shell: bash
      run: |
        ACIG_VERSION="${{ inputs.version }}"
        RELEASE_URL="https://github.com/helloodokai/acig/releases/download/v${ACIG_VERSION}"
        
        curl -sL "${RELEASE_URL}/checksums.txt" -o /tmp/checksums.txt
        
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        if [ "$ARCH" = "x86_64" ]; then ARCH="amd64"; fi
        if [ "$ARCH" = "aarch64" ]; then ARCH="arm64"; fi
        
        ARTIFACT="acig_${OS}_${ARCH}.tar.gz"
        
        curl -sL "${RELEASE_URL}/${ARTIFACT}" -o /tmp/acig.tar.gz
        
        cd /tmp
        EXPECTED=$(grep "${ARTIFACT}" checksums.txt | awk '{print $1}')
        if [ -z "$EXPECTED" ]; then
          echo "::error::could not find checksum for ${ARTIFACT}"
          exit 1
        fi
        ACTUAL=$(sha256sum acig.tar.gz | awk '{print $1}')
        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "::error::checksum mismatch: expected $EXPECTED got $ACTUAL"
          exit 1
        fi
        
        tar xzf acig.tar.gz -C /usr/local/bin acig
        chmod +x /usr/local/bin/acig

    - name: Run acig
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        OLLAMA_API_KEY: ${{ inputs.ollama-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        ARGS=(
          "--profile" "${{ inputs.profile }}"
          "--format" "${{ inputs.format }}"
          "--out" "/tmp/acig-review"
          "--pr" "${{ github.event.pull_request.number }}"
          "--sha" "${{ github.event.pull_request.head.sha }}"
        )
        
        if [ -n "${{ inputs.budget }}" ]; then
          ARGS+=("--budget" "${{ inputs.budget }}")
        fi
        
        acig run "${ARGS[@]}"
        EXIT_CODE=$?
        
        BLOCKING="${{ inputs.blocking }}"
        if [ "$BLOCKING" = "false" ]; then
          echo "acig: non-blocking mode, exiting 0 regardless"
          exit 0
        fi
        
        if [ "$EXIT_CODE" -ge 2 ]; then
          echo "::error::acig blocked this PR"
          exit 1
        fi

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: acig-verdict
        path: /tmp/acig-review.json